<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuanaTalk - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="img/logo.jpeg" alt="GuanaTalk Logo">
            <span>GuanaTalk</span>
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Favorite</a>
            <a href="#">About us</a>
        </nav>
        <button class="profile-btn">My Profile</button>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h1>GuanaTalk Login: Start Your Journey</h1>
            
            <form action="login.php" method="POST">
                <div class="input-group">
                    <div class="icon-box email-icon">📧</div>
                    <div class="input-field">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <div class="icon-box lock-icon">🔒</div>
                    <div class="input-field">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Remember Me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="illustration">
                <!-- Aquí iría la imagen de los volcanes -->
                <img src="volcanoes.png" alt="Salvadoran Landscape">
            </div>
        </div>

       <!-- FUN FACT -->
<div class="fun-fact">
    <div class="fun-left">
        <i class="fa-solid fa-bullhorn"></i>
        <p><b>Fun Fact:</b> We’re growing global community! Join and meet others</p>
    </div>
    <i class="fa-solid fa-chevron-right"></i>
</div>

    </main>
</body>
</html>
