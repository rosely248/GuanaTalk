<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register GuanaTalk</title>
    <link rel="stylesheet" href="style (1).css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="img/logo.png" alt="GuanaTalk Logo">
             <span>GuanaTalk</span>
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Favorite</a>
            <a href="#">About us</a>
        </nav>
        <button class="profile-btn">My Profile</button>
    </header>

    <div class="container">
        <div class="form-card">
            <h2>GuanaTalk Registration: Join Our Journey</h2>
        </div>
    </div>
    
    <form class="forms" action="register.php" method="POST">

        <div class="form-grid">

            <div class="form-group">
                <img src="img/user.png">
                <div>
                    <label>Full Name</label>
                    <input type="text" name="nombre" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="form-group">
                <img src="img/email.png">
                <div>
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <img src="img/password.png">
                <div>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>
            </div>

            <div class="form-group">
                <img src="img/password.png">
                <div>
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Confirm your password" required>
                    <p class="help-text">Need help registering?</p>
                </div>
            </div>

        </div>

        <button class="register-btn" type="submit">Register Now!</button>

    </form>

<!-- FUN FACT -->
<div class="fun-fact">
    <div class="fun-left">
        <i class="fa-solid fa-bullhorn"></i>
        <p><b>Fun Fact:</b> We’re growing global community! Join and meet others</p>
    </div>
    <i class="fa-solid fa-chevron-right"></i>
</div>

</body>
</html>
